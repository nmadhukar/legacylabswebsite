services:
  legacy-labs-website:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - SMTP_USER=coolify@dsiginc.com
      - SMTP_PASS=5131P@stroad!
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    labels:
      - coolify.managed=true

networks:
  coolify:
    external: true
